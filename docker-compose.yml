version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: apartment_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: apartment
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: apartment_backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: mysql://root:root_password@db:3306/apartment
      PORT: 3001
      JWT_SECRET: super_secret_jwt_key_123!
      JWT_REFRESH_SECRET: super_secret_refresh_jwt_key_456!
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: apartment_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001/api
    depends_on:
      - backend

volumes:
  mysql_data:
